# Режим отладки проекта
debug: True
debug_version_dataset_size: 1000

# Пути файлов
raw_dataset_path: "./data/raw_dataset.csv"
clean_dataset_path: "./data/clean_dataset.csv"
train_dataset_path: "./data/train_dataset.csv"
val_dataset_path: "./data/val_dataset.csv"
test_dataset_path: "./data/test_dataset.csv"

# Разделение и подготовка данных
val_size: 0.1
test_size: 0.1
random_state: 42
tokenizer_model_name: "distilgpt2"
batch_size: 128

# Параметры LSTM
embed_dim: 128
hidden_dim: 128
dropout: 0.3
lr: 3e-3
# lr: 3e-4
grad_clipping: 1.0

# Параметры Transformer
transformer_model_name: "distilgpt2"
temperature: 0.8
top_k: 50

# Общие параметры обучения и оценки моделей
n_epochs: 5
rouge_split_ratio: 0.75
max_new_tokens: 10
n_samples: 5
